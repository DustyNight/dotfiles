# Minimal Prompt Configuration
format = """$username$hostname$directory$git_branch$git_status$cmd_duration$line_break$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = ""
format = "[$symbol$branch]($style) "

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold yellow"

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "bold yellow"

# Disable unnecessary modules (keep it fast)
[package]
disabled = true

[nodejs]
disabled = true

[java]
disabled = true

[python]
disabled = true

[rust]
disabled = true

[golang]
disabled = true

[docker_context]
disabled = true
